<!doctype html>
<html>
  <head>
    <title>TranslatePlus API Reference</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
      <link rel="icon" href="https://translateplus.io/assets/images/translateplus.png" />
      <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header class="custom-header scalar-app">
      <a href="/"><img src="https://translateplus.io/assets/images/logo-dark.png" alt="TranslatePlus Logo" class="logo-dark" style="width: 200px; height: auto;"></a>
      <a href="/"><img src="https://translateplus.io/assets/images/logo-light.png" alt="TranslatePlus Logo" class="logo-light" style="width: 200px; height: auto;"></a>  
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>

      <nav id="nav-menu">
        <a href="https://translateplus.io" target="_blank">Website</a>
        <a href="https://app.translateplus.io" target="_blank">Dashboard</a>
        <a href="https://status.translateplus.io" target="_blank">Status</a>
      </nav>

      <script>
        function toggleMenu() {
          const navMenu = document.getElementById('nav-menu');
          navMenu.classList.toggle('active');
        }
      </script>
    </header>
    <div id="app"></div>

    <!-- Load the Script -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

    <!-- Initialize the Scalar API Reference -->
    <script>
      Scalar.createApiReference('#app', {
      url: 'https://api.translateplus.io/openapi.json',
      customCss: `
          .powered-by,
          .scalar-powered-by,
          a[href*="scalar.com"],
          [class*="PoweredBy"],
          [class*="powered-by"] {
            display: none !important;
          }
        `,
    });
    </script>
  </body>
</html>
